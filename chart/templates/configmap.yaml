apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homeharbor.fullname" . }}-config
  labels:
    {{- include "homeharbor.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3000"
  BETTER_AUTH_URL: "https://{{ .Values.apiHost }}"
  PERMIT_PDP_URL: {{ .Values.permit.pdpUrl | quote }}
  INNGEST_BASE_URL: {{ .Values.inngest.baseUrl | quote }}
  S3_ENDPOINT: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"
  AGENT_IDENTITY: "homeharbor"
