apiVersion: v1
kind: Service
metadata:
  name: {{ include "homeharbor.fullname" . }}-api
  labels:
    {{- include "homeharbor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "homeharbor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
